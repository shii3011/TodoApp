name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── ユニットテスト（Zod スキーマ検証）― サーバー不要 ────────────────
  backend-unit:
    name: Backend Unit Tests (Zod schemas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests via Docker Compose
        run: docker compose --profile test run --rm backend-test

  # ── 結合テスト（HTTP CRUD + 並列）― backend + db 起動が必要 ─────────
  backend-integration:
    name: Backend Integration Tests (HTTP CRUD + concurrent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests via Docker Compose
        run: docker compose --profile test run --rm backend-test-integration

  # ── TypeScript 型チェック ──────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit -p config/tsconfig.app.json
        working-directory: frontend
