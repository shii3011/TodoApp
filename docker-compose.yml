services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todoapp
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/todoapp
      # Cognito ID は公開値（フロントの JS バンドルにも含まれる）のためここに直接記載
      - COGNITO_USER_POOL_ID=us-east-1_O1SCe2bl6
      - COGNITO_CLIENT_ID=4njmn8jpqe2lr1e97pueg6ec84
      # SECRETS_ARN 未設定 = Secrets Manager をスキップ（本番 Lambda 専用）
      - SECRETS_ARN=
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12

  # ユニットテスト（Zod スキーマ検証）― サーバー不要
  backend-test:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/todoapp
      - SECRETS_ARN=
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm ci && npx prisma migrate deploy && npm test"
    profiles:
      - test

  # テスト専用バックエンドサーバー（NODE_ENV=test: Cognito 不要）
  backend-server-test:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/todoapp
      - SECRETS_ARN=
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm ci && npx prisma migrate deploy && npm run dev"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
    profiles:
      - test

  # 結合テスト（HTTP レベル CRUD + 並列）― backend-server-test が起動済みであること
  backend-test-integration:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - API_BASE_URL=http://backend-server-test:3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/todoapp
      - SECRETS_ARN=
    depends_on:
      backend-server-test:
        condition: service_healthy
    command: sh -c "npm ci && npm run test:integration"
    profiles:
      - test

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Cognito ID は公開値のためここに直接記載
      - VITE_COGNITO_USER_POOL_ID=us-east-1_O1SCe2bl6
      - VITE_COGNITO_CLIENT_ID=4njmn8jpqe2lr1e97pueg6ec84
      # Docker 内では backend コンテナへ Vite proxy 経由でルーティングする。
      # ブラウザは /api/* → http://backend:3000/* にプロキシされるため
      # Docker 内部 DNS を直接解決しなくて済む。
      - VITE_API_PROXY_TARGET=http://backend:3000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12

  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - PLAYWRIGHT_BASE_URL=http://frontend:5173
      - VITE_API_PROXY_TARGET=http://backend:3000
      - E2E_EMAIL=${E2E_EMAIL}
      - E2E_PASSWORD=${E2E_PASSWORD}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    command: sh -c "npm ci && npx playwright test --config config/playwright.config.ts"
    profiles:
      - test

volumes:
  db-data:
